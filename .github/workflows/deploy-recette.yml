name: Deploy recette

# WORKFLOW SETUP : 
# 1 : Generate token (write:packages, delete:packages)
# 2 : Add secret ['SERVER_HOST_DEV','SERVER_USER_DEV','SERVER_SSH_KEY_DEV','SERVER_PORT_DEV','ghrcToken','ghrcUser','ENVFRONT_DEV']
# 3 : Sur le serveur de recette, le compose.yml doit pointer sur frontend-recette:latest et api-recette:latest
# 4 : La branche 'recette' doit exister sur le serveur de recette

on:
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Fix uppercase issues with URLs
      - name: UPPER to lower
        run: |
          echo "ACTOR_LOWER=$(echo '${{ github.actor }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Track updates on API & front
      - name: Set up Git for checking changes
        run: git fetch --prune --unshallow

      - name: Check if front has changed
        id: check_frontend
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^front/'; then
            echo "FRONTEND_CHANGED=true" >> $GITHUB_ENV
          else
            echo "FRONTEND_CHANGED=false" >> $GITHUB_ENV
          fi

      - name: Check if api has changed
        id: check_api
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^api/'; then
            echo "API_CHANGED=true" >> $GITHUB_ENV
          else
            echo "API_CHANGED=false" >> $GITHUB_ENV
          fi

      # Stop if no changes were made
      - name: Stop if no changes were made to front or api
        run: |
          if [[ "$FRONTEND_CHANGED" == "false" && "$API_CHANGED" == "false" ]]; then
            echo "Aucun changement dans frontend ou API, arrêt du workflow."
            exit 0
          fi

      - name: Login
        run: echo "${{ secrets.ghrcToken }}" | docker login ghcr.io -u ${{ secrets.ghrcUser }} --password-stdin


      # SECRET FRONT (mv .env.exemple .env + add .ENVFRONT to .env)
      - name: Build Front
        if: env.FRONTEND_CHANGED == 'true'
        run: |
          echo -e "User-agent: *\nDisallow: /" > ./front/public/robots.txt
          touch ./front/.env
          echo "${{ secrets.ENVFRONT_DEV }}" | tee -a ./front/.env > /dev/null
          docker build -f ./front/Dockerfile -t ghcr.io/${{ env.REPO_LOWER }}/frontend-recette:latest ./front
          docker push ghcr.io/${{ env.REPO_LOWER }}/frontend-recette:latest

      - name: Build API
        if: env.API_CHANGED == 'true'
        run: |
          docker build -f ./api/Dockerfile -t ghcr.io/${{ env.REPO_LOWER }}/api-recette:latest ./api
          docker push ghcr.io/${{ env.REPO_LOWER }}/api-recette:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest


    # Rebuild without downtime, only if changes were made + remove unused images
    steps:
      - name: Deploy on Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST_DEV }}
          username: ${{ secrets.SERVER_USER_DEV }}
          key: ${{ secrets.SERVER_SSH_KEY_DEV }}
          port: ${{ secrets.SERVER_PORT_DEV}}
          script: |
            cd /home/$(whoami)/setup-production
            docker compose run --rm -e BACKUP_PREFIX=backups/pre-deploy db_backup
            pwd
            echo "${{ secrets.ghrcToken }}" | docker login ghcr.io -u ${{ secrets.ghrcUser }} --password-stdin
            git pull origin recette
            docker compose -f compose.yml pull
            docker compose -f compose.yml up -d --remove-orphans
            docker image prune -f
